<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Usuários</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Cadastro de Usuário</h1>
    <form id="formCadastro">

      <div class="grupo">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" placeholder="Digite seu nome" />
      </div>

      <div class="grupo">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" />
      </div>

      <div class="grupo">
        <label for="cep">CEP</label>
        <div class="cep-wrapper">
          <input type="text" id="cep" placeholder="00000-000" maxlength="9" />
          <span id="cep-status"></span>
        </div>
      </div>

      <div class="grupo">
        <label for="logradouro">Logradouro</label>
        <input type="text" id="logradouro" placeholder="Rua / Avenida" readonly />
      </div>

      <div class="linha">
        <div class="grupo">
          <label for="bairro">Bairro</label>
          <input type="text" id="bairro" placeholder="Bairro" readonly />
        </div>
        <div class="grupo">
          <label for="numero">Número</label>
          <input type="text" id="numero" placeholder="Nº" />
        </div>
      </div>

      <div class="linha">
        <div class="grupo">
          <label for="cidade">Cidade</label>
          <input type="text" id="cidade" placeholder="Cidade" readonly />
        </div>
        <div class="grupo">
          <label for="uf">UF</label>
          <input type="text" id="uf" placeholder="UF" maxlength="2" readonly />
        </div>
      </div>

      <div class="grupo">
        <label for="complemento">Complemento</label>
        <input type="text" id="complemento" placeholder="Apto, bloco, etc." />
      </div>

      <div class="acoes">
        <button type="submit">Salvar</button>
        <button type="button" id="btnLimpar">Limpar</button>
      </div>

      <p id="mensagem"></p>
    </form>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
